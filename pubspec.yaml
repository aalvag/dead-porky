name: dead_porky
description: "Tu centro de control personal de salud, ejercicio y bienestar. PWA con integración de wearables y asistencia de IA."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # ==================== Firebase ====================
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3
  firebase_crashlytics: ^5.1.0
  firebase_analytics: ^12.2.0

  # ==================== State Management ====================
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ==================== Navigation ====================
  go_router: ^14.8.1

  # ==================== Local Database ====================
  drift: ^2.19.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # ==================== Dependency Injection ====================
  get_it: ^8.0.0
  injectable: ^2.4.0

  # ==================== HTTP & Networking ====================
  dio: ^5.8.0
  http: ^1.2.0

  # ==================== Code Generation Support ====================
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ==================== BLE / Wearables ====================
  flutter_blue_plus: ^1.31.0

  # ==================== Health APIs ====================
  health: ^13.3.1
  # health_connector: ^3.8.1  # Uncomment when available for your Flutter version

  # ==================== AI / Kilo Gateway ====================
  openai_dart: ^0.5.4
  eventflux: ^2.2.1

  # ==================== UI Components ====================
  fl_chart: ^0.70.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.16
  lottie: ^3.1.2

  # ==================== Security ====================
  flutter_secure_storage: ^10.0.0
  local_auth: ^2.3.0

  # ==================== Voice Input ====================
  speech_to_text: ^7.3.0

  # ==================== Notifications ====================
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # ==================== Utils ====================
  intl: ^0.19.0
  uuid: ^4.5.1
  dartz: ^0.10.1
  logger: ^2.5.0
  connectivity_plus: ^6.1.1
  flutter_dotenv: ^5.0.2
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  image_picker: ^1.1.2

  # ==================== Export ====================
  pdf: ^3.11.1
  csv: ^6.0.0
  printing: ^5.13.4

  # ==================== Storage ====================
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ==================== Auth Social ====================
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # ==================== Code Generation ====================
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  injectable_generator: ^2.7.0
  drift_dev: ^2.19.0
  riverpod_generator: ^2.6.3

  # ==================== Testing ====================
  mocktail: ^1.0.0
  bloc_test: ^10.0.0
  golden_toolkit: ^0.15.0

  # ==================== Linting ====================
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/animations/
    - assets/images/
    - .env

  # fonts:
